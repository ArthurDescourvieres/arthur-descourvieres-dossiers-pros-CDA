# Ephemeral services for integration tests (§18.2).
# PostgreSQL runs on tmpfs (no durable volume) and Redis without persistence,
# so every `up` starts from a clean slate and teardown leaves nothing behind.
#
# NOTE: the spec reserves host port 5433 for the test DB, but that port is
# already taken by another project on this machine, so we publish on 5434.
# The host port is arbitrary — only the test connection strings reference it.
services:
  test-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: notion_test
    ports:
      - '5434:5432'
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U test -d notion_test']
      interval: 2s
      timeout: 3s
      retries: 25

  test-redis:
    image: redis:7-alpine
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 2s
      timeout: 3s
      retries: 25
