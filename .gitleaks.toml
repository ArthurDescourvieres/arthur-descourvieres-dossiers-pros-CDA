title = "Memo — gitleaks"

# Repart des règles de détection de secrets par défaut de gitleaks.
[extend]
useDefault = true

# Faux positifs connus : secrets factices utilisés par les tests.
[allowlist]
description = "Fixtures de test (secrets non sensibles)"
regexes = ['''test-only-jwt-secret-do-not-use-in-prod''']
paths = ['''.*\.test\.ts$''', '''backend/vitest\.config\.ts$''']
