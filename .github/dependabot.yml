# Surveillance automatique des dépendances (OWASP A06 — Vulnerable Components).
# Dependabot ouvre une pull request dès qu'une mise à jour est disponible,
# en priorité pour les correctifs de sécurité.
version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/backend'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 3
    commit-message:
      prefix: 'chore(deps)'
    groups:
      backend-deps:
        patterns:
          - '*'

  - package-ecosystem: 'npm'
    directory: '/frontend'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 3
    commit-message:
      prefix: 'chore(deps)'
    groups:
      frontend-deps:
        patterns:
          - '*'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    commit-message:
      prefix: 'chore(ci)'
