# Surveillance automatique des dépendances (OWASP A06 — Vulnerable Components).
# Dependabot ouvre une pull request dès qu'une mise à jour est disponible,
# en priorité pour les correctifs de sécurité.
#
# Les montées de version MAJEURES (ex. React 18→19, Prisma 6→7, Vite 6→8) sont
# ignorées : ce sont des migrations à part entière, à traiter manuellement et une
# par une. Dependabot ne propose donc que du patch/minor (correctifs + sécurité),
# ce qui garde la CI verte et le projet stable.
version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/backend'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 3
    commit-message:
      prefix: 'chore(deps)'
    groups:
      backend-deps:
        patterns:
          - '*'
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  - package-ecosystem: 'npm'
    directory: '/frontend'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 3
    commit-message:
      prefix: 'chore(deps)'
    groups:
      frontend-deps:
        patterns:
          - '*'
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    commit-message:
      prefix: 'chore(ci)'
