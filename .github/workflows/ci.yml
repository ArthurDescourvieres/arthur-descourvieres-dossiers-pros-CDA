name: CI

# Quality gate for every pull request, and image publication on main.
# Steps run cheapest-first so the pipeline fails as early as possible.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Types & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # --- Backend ---
      - name: Backend · install
        working-directory: backend
        run: npm ci

      - name: Backend · generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Backend · typecheck
        working-directory: backend
        run: npx tsc --noEmit

      - name: Backend · unit tests
        working-directory: backend
        run: npm test

      # --- Frontend ---
      - name: Frontend · install
        working-directory: frontend
        run: npm ci

      - name: Frontend · typecheck
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Frontend · unit tests
        working-directory: frontend
        run: npm test

  lint:
    name: Lint, format & secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root tooling
        run: npm ci

      - name: Prettier (check)
        run: npm run format:check

      - name: ESLint
        run: npm run lint

      - name: Audit backend dependencies (high/critical)
        working-directory: backend
        run: npm audit --audit-level=high

      # Front build tooling (vite/esbuild) is dev-only and never shipped: the app
      # is served as static assets by Caddy and the image is scanned by Trivy.
      # We therefore gate on production dependencies here. The backend audit above
      # stays full-tree (its only patched esbuild is compatible with tsx/vitest).
      - name: Audit frontend production dependencies (high/critical)
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high

      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Backend · install
        working-directory: backend
        run: npm ci

      - name: Backend · generate Prisma client
        working-directory: backend
        run: npx prisma generate

      # Spins up ephemeral PostgreSQL + Redis (docker-compose.test.yml, tmpfs)
      # and waits for their healthchecks (`up -d --wait`) — the readiness probe
      # that removed the flaky "DB not ready yet" failures.
      - name: Integration tests (ephemeral PG/Redis)
        working-directory: backend
        run: npm run test:integration

      - name: Tear down test services
        if: always()
        working-directory: backend
        run: npm run test:integration:down

  build-and-push:
    name: Build & push images (GHCR)
    runs-on: ubuntu-latest
    needs: [quality, integration, lint]
    # Only publish from main; PRs just run the quality gate above.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Compute lowercase image prefix
        id: img
        run: echo "prefix=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: production
          push: true
          tags: |
            ${{ steps.img.outputs.prefix }}-backend:latest
            ${{ steps.img.outputs.prefix }}-backend:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push web image (front build served by Caddy)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: production
          push: true
          tags: |
            ${{ steps.img.outputs.prefix }}-web:latest
            ${{ steps.img.outputs.prefix }}-web:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Scan the published images (OWASP A06). A fixable HIGH/CRITICAL fails the
      # run, so the Deploy workflow (which only fires on a green CI) never starts.
      # ignore-unfixed avoids failing on vulnerabilities that have no patch yet.
      - name: Scan backend image (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.img.outputs.prefix }}-backend:sha-${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Scan web image (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.img.outputs.prefix }}-web:sha-${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
