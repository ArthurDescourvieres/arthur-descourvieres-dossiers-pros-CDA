# Production orchestration for Memo — distinct from docker-compose.yml (dev).
#
# Differences from the dev compose:
#   - no source bind mounts, no `build:` — images are pulled from GHCR by
#     immutable tag (BACKEND_IMAGE / WEB_IMAGE);
#   - only Caddy publishes ports (80/443); Postgres and Redis stay on the
#     internal network, unreachable from the host;
#   - every service declares a healthcheck and restart: unless-stopped.
#
# Deploy sequence (run on the VPS, see docs/deployment/):
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml --profile migrate run --rm migrate
#   docker compose -f docker-compose.prod.yml up -d

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Used by the init hook to create the least-privilege runtime role.
      APP_DB_USER: ${APP_DB_USER}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Runs only on first init: provisions the DML-only app role (no DDL).
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    networks: [app]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--save', '60', '1', '--appendonly', 'no']
    volumes:
      - redisdata:/data
    networks: [app]
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot job: apply pending Prisma migrations before the API rolls over.
  # Kept in the `migrate` profile so `up -d` never starts it; the deploy
  # workflow runs it explicitly with `run --rm`.
  migrate:
    image: ${BACKEND_IMAGE}
    profiles: ['migrate']
    command: ['npx', 'prisma', 'migrate', 'deploy']
    environment:
      # Migrations need DDL, so they connect as the cluster owner — NOT the
      # least-privilege app role the API uses at runtime (DATABASE_URL).
      DATABASE_URL: ${MIGRATE_DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    networks: [app]
    restart: 'no'

  api:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      UPLOADS_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [app]
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/api/health >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  caddy:
    image: ${WEB_IMAGE}
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    networks: [app]
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:2019/config/ >/dev/null 2>&1 || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
  redisdata:
  uploads:
  caddy_data:
  caddy_config:

networks:
  app:
    driver: bridge
